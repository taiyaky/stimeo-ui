# Publish npm + gem from this repo's CI when a release tag (v*) is pushed.
#
# Both registries use OIDC Trusted Publishing — no API keys/secrets. Register a
# trusted publisher (GitHub Actions · repo taiyaky/stimeo-ui · workflow publish.yml
# · blank Environment) for:
#   - npm package `stimeo-ui` on npmjs.com (Package → Settings → Trusted Publisher).
#     Needs npm >= 11.5.1 (installed below); provenance is automatic; no token.
#   - gem `stimeo-ui` on rubygems.org (Trusted Publishers).
# Both jobs use `id-token: write` (OIDC). npm provenance requires this repo PUBLIC.
# (npm's first publish used a token because OIDC can't be pre-configured for a
# not-yet-published package; from v0.1.0-alpha.1 onward it is tokenless.)
name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # pinned
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.5.1 # pinned: Trusted Publishing needs npm >= 11.5.1 (Node 22 ships npm 10)
      - run: bun install
      - run: bun run build # tsup → dist/ (DTS resolves: @floating-ui/dom is a devDep)
      - run: npm publish --access public --tag beta # prerelease ⇒ npm requires an explicit --tag (it refuses a tagless prerelease publish; `latest` is reserved for non-prereleases). OIDC Trusted Publishing → tokenless; provenance automatic

  gem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # pinned
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: bun install
      - run: bun run build # gem packages the built dist/ (see gemspec `files`)
      - name: Configure RubyGems trusted publishing (OIDC)
        uses: rubygems/configure-rubygems-credentials@v2.1.0
      - name: Build & push gem (skip if this exact version is already on RubyGems)
        run: |
          gem build stimeo-ui.gemspec
          ver="$(ruby -Ilib -e 'require "stimeo/ui/version"; print Stimeo::UI::VERSION')"
          # Exact-match the published list ("gem (a, b)") so 0.1.0.pre.beta.1 is
          # not matched by a prefix collision like 0.1.0.pre.beta.10.
          published="$(gem list -r -e -a --prerelease stimeo-ui | sed -n 's/.*(\(.*\)).*/\1/p')"
          if printf '%s' "$published" | tr ',' '\n' | tr -d ' ' | grep -qxF "$ver"; then
            echo "stimeo-ui $ver already on RubyGems — skipping push (idempotent re-run)."
          else
            gem push stimeo-ui-*.gem
          fi
