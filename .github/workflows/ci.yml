# CI for the published library: lint, typecheck, unit tests, and build (bun).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # pinned
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
